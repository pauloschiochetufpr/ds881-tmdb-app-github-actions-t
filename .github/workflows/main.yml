name: CI Pipeline

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  test:
    name: Run Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: ['20', '24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build Expo Web (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: ['20', '24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Injetar TMDB API Key
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> .env

      - name: Build Expo Web
        run: npx expo export --platform web --output-dir dist

      - name: Criar nojekyll
        run: touch ./dist/.nojekyll

      - name: Upload Dist
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.node-version }}
          path: ./dist

  deploy:
    name: Deploy Pages (Node 24)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/release'

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Carregar Dist
        uses: actions/download-artifact@v4
        with:
          name: dist-24
          path: ./dist

      - name: Configurar pages
        uses: actions/configure-pages@v5

      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy pages
        uses: actions/deploy-pages@v4

  build-android:
    name: Build Android (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: ['20', '24']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Injetar TMDB API Key
        run: echo "EXPO_PUBLIC_TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}" >> .env

      - name: Expo prebuild
        run: npx expo prebuild --platform android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Verify APK
        run: ls -la android/app/build/outputs/apk/release/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ matrix.node-version }}
          path: android/app/build/outputs/apk/release/app-release.apk

  release:
    name: Create Release (Node 24)
    runs-on: ubuntu-latest
    needs: build-android
    if: github.ref == 'refs/heads/release'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-24

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: ./app-release-24/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}